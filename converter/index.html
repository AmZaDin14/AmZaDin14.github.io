<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Home Page</title>
</head>

<body>
    <header>
        <h1 class="bg-dark text-white text-center">Ammah Website</h1>
        <nav class="navbar navbar-expand-sm bg-light">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a href="../" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Number Converter</a>
                </li>
            </ul>
        </nav>
    </header>
    <section>
        <form autocomplete="off" name="MyForm" onsubmit="return convert()">
            Input
            <br>
            <select name="Input" id="in" onchange="return hide()">
                <option value="bin">Binary</option>
                <option value="oct">Octal</option>
                <option value="dec" selected="selected">Decimal</option>
                <option value="hex">Hexadecimal</option>
            </select>
            <input type="text" name="FirstInput" id="fi">

            <br>
            Output
            <br>

            <select name="Output" id="out">
                <option value="bin" id="bin">Binary</option>
                <option value="oct" id="oct">Octal</option>
                <option value="dec" id="dec">Decimal</option>
                <option value="hex" id="hex">Hexadecimal</option>
            </select>
            <span id="output"></span>
            <br>

            <input type="submit" value="Convert">
        </form>
    </section>
    <footer class="bg-primary text-white text-center">
        Copyright &copy; 2020
    </footer>
</body>
<script>
    document.getElementById('dec').style['display'] = 'none';
</script>

</html>
